name: release

on:
  # zizmor: ignore[dangerous-triggers] -- branchesで制限済み、信頼できない入力は使用していない
  workflow_run:
    workflows: [check]
    types: [completed]
    branches: [master, main]

permissions: {}

jobs:
  release:
    name: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # タグ作成のため
      id-token: write # niks3 OIDC認証
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: "${{ github.event.workflow_run.head_sha }}"
          persist-credentials: false
          fetch-depth: 0 # タグの存在確認と作成に全履歴が必要
      # workflow_runでpathsフィルタは使えないのでジョブ内でのチェックが必要になります。
      - name: Check cabal file changed
        id: changed
        run: |
          set -euo pipefail
          # 最新のリリースタグを取得(なければ全履歴を対象)
          LAST_TAG=$(git describe --tags --match 'v*' --abbrev=0 || git rev-list --max-parents=0 HEAD)
          if git diff --name-only "$LAST_TAG" HEAD -- '*.cabal' | grep -q '.cabal'; then
            echo "cabal_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "cabal_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Extract version
        if: steps.changed.outputs.cabal_changed == 'true'
        id: version
        run: |
          set -euo pipefail
          VERSION=$(sed -n 's/^version:[[:space:]]*//p' ./*.cabal | head -1)
          if [ "$VERSION" = "0.0.0.0" ]; then
            echo "Initial version, skipping release"
          elif ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid PVP format: $VERSION"
            exit 1
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
      - name: Check if tag exists
        id: check_tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif git show-ref --verify --quiet "refs/tags/v$VERSION"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: ncaq/nix-composite-action@76930b11f37310bc68c66492a09045c4f0432226 # v1.3.1
        if: steps.check_tag.outputs.skip != 'true'
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build sdist
        if: steps.check_tag.outputs.skip != 'true'
        run: nix develop --command cabal sdist
      - name: Build documentation for Hackage
        if: steps.check_tag.outputs.skip != 'true'
        run: nix develop --command cabal haddock --haddock-for-hackage
      - name: Create tag
        if: steps.check_tag.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
      - name: Create GitHub Release
        if: steps.check_tag.outputs.skip != 'true'
        run: gh release create "v$VERSION" --generate-notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to Hackage
        if: steps.check_tag.outputs.skip != 'true' && env.HACKAGE_AUTH_TOKEN != ''
        uses: haskell-actions/hackage-publish@73c1489054aa60b7aa082cdde9b51502d960c0e1 # v1.1
        env:
          HACKAGE_AUTH_TOKEN: ${{ secrets.HACKAGE_AUTH_TOKEN }}
        with:
          hackageToken: ${{ secrets.HACKAGE_AUTH_TOKEN }}
          packagesPath: dist-newstyle/sdist/
          docsPath: dist-newstyle/
          publish: true
