name: release

on:
  workflow_run:
    workflows: [check]
    types: [completed]
    branches: [master, main]

permissions:
  contents: write # タグ作成のため

jobs:
  release:
    runs-on: ubuntu-24.04
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Extract version
        id: version
        run: |
          # プロジェクトに合わせてバージョン取得方法を実装してください。
          # 例: package.jsonのversion, Cargo.tomlのversion, cabalのversionなど。
          # echo "version=..." >> "$GITHUB_OUTPUT"
          echo "Not implemented: version extraction"
      - name: Check if tag exists
        id: check_tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif git show-ref --verify --quiet "refs/tags/v$VERSION"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag
        if: steps.check_tag.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
      - name: Create GitHub Release
        if: steps.check_tag.outputs.skip != 'true'
        run: gh release create "v$VERSION" --generate-notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
