name: push

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
  merge_group:

permissions:
  contents: read # リポジトリコンテンツの読み取り

jobs:
  nix-fast-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
      - run: nix run '.#nix-fast-build' -- --option eval-cache false --no-link --skip-cached --no-nom

  release:
    needs: [nix-fast-build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write # タグ作成のため
    # デフォルトブランチへのpushまたはworkflow_dispatchの場合のみ実行
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          # プロジェクトに合わせてバージョン取得方法を実装してください。
          # 例: package.jsonのversion, Cargo.tomlのversion, cabalのversionなど。
          # echo "version=..." >> "$GITHUB_OUTPUT"
          echo "Not implemented: version extraction"
      - name: Check if tag exists
        id: check_tag
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag
        if: steps.check_tag.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
      - name: Create GitHub Release
        if: steps.check_tag.outputs.skip != 'true'
        run: gh release create "v${{ steps.version.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
