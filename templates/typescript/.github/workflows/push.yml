name: push

on:
  workflow_dispatch:
  push:
    branches: [master, main]
  pull_request:
  merge_group:

permissions:
  contents: read # リポジトリコンテンツの読み取り

jobs:
  nix-fast-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
      - run: nix run '.#nix-fast-build' -- --option eval-cache false --no-link --skip-cached --no-nom

  release:
    needs: [nix-fast-build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write # タグ作成のため
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    # デフォルトブランチへのpushの場合のみ実行
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Extract version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" = "0.0.0" ]; then
            echo "Initial version, skipping release"
          elif ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semver format: $VERSION"
            exit 1
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
      - name: Check if tag exists
        id: check_tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif git show-ref --verify --quiet "refs/tags/v$VERSION"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag
        if: steps.check_tag.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
      - name: Create GitHub Release
        if: steps.check_tag.outputs.skip != 'true'
        run: gh release create "v$VERSION" --generate-notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
