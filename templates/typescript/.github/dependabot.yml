version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    open-pull-requests-limit: 20
    labels:
      - "Type: CI"
      - "Type: Dependencies"
    schedule:
      interval: daily
  - package-ecosystem: npm
    directory: "/"
    open-pull-requests-limit: 20
    labels:
      - "Type: Dependencies"
    schedule:
      interval: monthly
    groups:
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/node"
      eslint:
        patterns:
          - "*eslint*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
