name: release

on:
  # zizmor: ignore[dangerous-triggers] -- branchesで制限済み、信頼できない入力は使用していない
  workflow_run:
    workflows: [check]
    types: [completed]
    branches: [master, main]

permissions: {}

jobs:
  release:
    name: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # タグ作成のため
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "${{ github.event.workflow_run.head_sha }}"
          persist-credentials: false
          fetch-depth: 0 # タグの存在確認と作成に全履歴が必要
      - name: Check VERSION changed
        id: changed
        run: |
          set -euo pipefail
          LAST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          if git diff --name-only "$LAST_TAG" HEAD -- VERSION | grep -q VERSION; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Extract version
        if: steps.changed.outputs.changed == 'true'
        id: version
        run: |
          set -euo pipefail
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if [ "$VERSION" = "0.0.0" ]; then
            echo "Initial version, skipping release"
          elif ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semver format: $VERSION"
            exit 1
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi
      - name: Check if tag exists
        id: check-tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif git show-ref --verify --quiet "refs/tags/v$VERSION"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag
        if: steps.check-tag.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
      - name: Create GitHub Release
        if: steps.check-tag.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v$VERSION" --generate-notes
