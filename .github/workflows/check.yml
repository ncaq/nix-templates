name: check

on:
  push:
    branches: [master, main]
  pull_request:
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-fast-build:
    name: nix-fast-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read # リポジトリコンテンツの読み取り
      id-token: write # niks3 OIDC認証
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ncaq/nix-composite-action@5a61f70ad5b7d2f276732e14355b7fb2ddd4caaf # v1.3.0
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix run '.#nix-fast-build' -- --option eval-cache false --no-link --skip-cached --no-nom

  # `nix-fast-build`は`flake.lock`をignoreしている状態では働かないため、
  # `nix flake check`を使います。
  # templateでは`flake.lock`をコミットしていません。
  # templateは`nix flake init`で使われるため、
  # ユーザの環境で新しい`flake.lock`が生成される方が望ましく、
  # 作成者の環境のスナップショットである`flake.lock`を配布する意味がないためです。
  # そのため、ここでのチェックは再現性よりも、
  # templateが最新のnixpkgsで壊れていないかの検証を目的としています。
  nix-flake-check:
    name: nix-flake-check
    strategy:
      fail-fast: false
      matrix:
        template:
          - basic
          - github-action
          - haskell-himari
          - haskell-nix-himari
          - typescript
    runs-on: ubuntu-24.04
    permissions:
      contents: read # リポジトリコンテンツの読み取り
      id-token: write # niks3 OIDC認証
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ncaq/nix-composite-action@5a61f70ad5b7d2f276732e14355b7fb2ddd4caaf # v1.3.0
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix flake check
        working-directory: ./templates/${{ matrix.template }}

  # 開発環境として使えるかチェックと、
  # 開発ツールのキャッシュへの保存を兼ねています。
  nix-develop:
    name: nix-develop
    strategy:
      fail-fast: false
      matrix:
        template:
          - basic
          - github-action
          - haskell-himari
          - haskell-nix-himari
          - typescript
    runs-on: ubuntu-24.04
    permissions:
      contents: read # リポジトリコンテンツの読み取り
      id-token: write # niks3 OIDC認証
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ncaq/nix-composite-action@5a61f70ad5b7d2f276732e14355b7fb2ddd4caaf # v1.3.0
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix develop --command true
        working-directory: ./templates/${{ matrix.template }}
