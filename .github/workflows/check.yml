name: check

on:
  push:
    branches: [master, main]
  pull_request:
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-fast-build:
    name: nix-fast-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read # リポジトリコンテンツの読み取り
      id-token: write # niks3 OIDC認証
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ncaq/nix-composite-action@9ecb278bd92662648714839d5013ffcd37c7383f # v1.2.0
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix run '.#nix-fast-build' -- --option eval-cache false --no-link --skip-cached --no-nom
        # nix-fast-buildはflake.lockをignoreしている状態では働かないため、nix flake checkを使います。
        # templateではflake.lockをコミットしていません。
        # templateはnix flake initで使われるため、
        # ユーザの環境で新しいflake.lockが生成される方が望ましく、
        # 作成者の環境のスナップショットであるflake.lockを配布する意味がないためです。
        # そのため、ここでのチェックは再現性よりも、
        # templateが最新のnixpkgsで壊れていないかの検証を目的としています。
      - run: nix flake check
        working-directory: ./templates/basic
      - run: nix flake check
        working-directory: ./templates/github-action
      - run: nix flake check
        working-directory: ./templates/haskell-himari
      - run: nix flake check
        working-directory: ./templates/typescript
